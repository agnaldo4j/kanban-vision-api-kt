codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        # 2% tolerance: JaCoCo exclusions for Java 25 serialization-generated code
        # (write$Self$, SerializationConstructorMarker) changed what is reported.
        # Internal gate remains JaCoCo >= 96% per module.
        threshold: 2%
    patch:
      default:
        target: auto
        # Same 2% tolerance as project (above). Kotlin null-safety compiler branches
        # (`x?.let {} ?: y`, `isNullOrBlank`) and value-class `init` guards produce
        # partial/unreachable branches on touched lines that cannot be covered by a
        # test. JaCoCo (>= 96% per module) remains the hard internal gate.
        threshold: 2%

fixes:
  # Mais específico primeiro: módulos extraídos (GAP-CJ/CK) moram em seus próprios src, não domain/src.
  - "com/kanbanvision/domain/common/::domain-common/src/main/kotlin/com/kanbanvision/domain/common/"
  - "com/kanbanvision/domain/model/kanban/::domain-kanban/src/main/kotlin/com/kanbanvision/domain/model/kanban/"
  - "com/kanbanvision/domain/model/organization/::domain-kanban/src/main/kotlin/com/kanbanvision/domain/model/organization/"
  - "com/kanbanvision/domain/::domain-simulation/src/main/kotlin/com/kanbanvision/domain/"
  - "com/kanbanvision/usecases/::usecases/src/main/kotlin/com/kanbanvision/usecases/"
  - "com/kanbanvision/httpapi/::http_api/src/main/kotlin/com/kanbanvision/httpapi/"
  - "com/kanbanvision/persistence/::sql_persistence/src/main/kotlin/com/kanbanvision/persistence/"
