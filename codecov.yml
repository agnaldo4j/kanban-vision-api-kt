codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        # 2% tolerance: JaCoCo exclusions for Java 25 serialization-generated code
        # (write$Self$, SerializationConstructorMarker) changed what is reported.
        # Internal gate remains JaCoCo >= 96% per module.
        threshold: 2%

fixes:
  - "com/kanbanvision/domain/::domain/src/main/kotlin/com/kanbanvision/domain/"
  - "com/kanbanvision/usecases/::usecases/src/main/kotlin/com/kanbanvision/usecases/"
  - "com/kanbanvision/httpapi/::http_api/src/main/kotlin/com/kanbanvision/httpapi/"
  - "com/kanbanvision/persistence/::sql_persistence/src/main/kotlin/com/kanbanvision/persistence/"
