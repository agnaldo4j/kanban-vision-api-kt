global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/prometheus-alerts.yml"

scrape_configs:
  - job_name: "kanban-vision-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["app:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "kanban-vision-api"
