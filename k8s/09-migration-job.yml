# Pre-deploy migration Job for schema changes that are NOT safe under RollingUpdate.
#
# When a migration changes a column type (e.g. TEXT → JSONB), old pods still serving
# traffic will fail writes after the migration runs, because PostgreSQL rejects varchar
# in prepared statements targeting JSONB columns. Running this Job BEFORE the deployment
# rollout ensures all schema changes are complete before any new pod starts.
#
# This file is included in kustomization.yaml so that kustomize rewrites the
# secretKeyRef to match the hash-suffixed name generated by secretGenerator.
# NEVER apply this file directly with kubectl apply -f — use kustomize instead.
#
# Flyway is idempotent: if no pending migrations exist the Job logs and exits 0.
# ttlSecondsAfterFinished cleans up the completed pod automatically.
#
# Deploy procedure for migrations that change column types (two-phase):
#
# Phase 1 — run migration BEFORE any new pod starts:
#   kubectl kustomize k8s/ | kubectl apply -f - -l app.kubernetes.io/component=migration
#   kubectl wait --for=condition=complete job/kanban-migration \
#     --namespace kanban-vision --timeout=120s
#
#   kubectl kustomize resolves the hash-suffixed secret name; -l filters to only
#   the Job so the Deployment is not started yet.
#
# Phase 2 — rollout new application pods after migration is confirmed complete:
#   kubectl apply -k k8s/
#   kubectl rollout status deployment/kanban-vision-api -n kanban-vision
#
# WARNING: running kubectl apply -k k8s/ without Phase 1 first will start the
# Deployment rollout in parallel with the migration Job. Old pods serving TEXT-era
# writes will fail once the column becomes JSONB. Always follow the two-phase
# procedure for migrations that change column types.
#
# For additive migrations (ADD COLUMN nullable, CREATE INDEX CONCURRENTLY) a single
# kubectl apply -k k8s/ is safe — no type change, no write incompatibility.
#
# See ADR-0013 and GAP-Y for rationale.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kanban-migration
  namespace: kanban-vision
  labels:
    app.kubernetes.io/name: kanban-vision-api
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kanban-vision-api
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: migrate
          image: kanban-vision-api:latest
          imagePullPolicy: IfNotPresent
          # Binário nativo dedicado de migração (ADR-0032): compilado do MigrationMainKt,
          # lê DATABASE_* + FLYWAY_LOCATIONS (ENV da imagem), roda o Flyway, fecha o
          # pool e sai — Ktor nunca sobe. Substitui o antigo `java -cp app.jar` (não
          # existe `java` na imagem nativa).
          command:
            - "/app/kanban-vision-migrate"
            - "-Djava.io.tmpdir=/tmp"
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: kanban-vision-config
                  key: DATABASE_URL
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: kanban-vision-config
                  key: DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kanban-vision-secret
                  key: DATABASE_PASSWORD
          # Right-size por medição (ADR-0036 / GAP-BR): o binário nativo de migração roda com
          # --gc=epsilon; validado em DB virgem sob 256Mi/0.5cpu — 2 migrações, exit 0, sem OOM.
          # CPU fica em 500m (não segue o 1000m da API): o Job é bounded, roda uma vez no
          # pré-rollout e não tem SLA de latência — o throughput da API não se aplica aqui.
          # ⚠️ Epsilon NUNCA libera ⇒ o pico é função da alocação TOTAL do Job, não do live set.
          # As migrações atuais são 8 KB de DDL. Um backfill de dados grande exige remedir ANTES
          # de fundir — este limite não tem a folga que a API tem.
          resources:
            requests:
              # 100m → 250m (ADR-0037, mesmo princípio da API): o request é declaração factual ao
              # scheduler. Razão 2:1 com o limit abaixo.
              cpu: "250m"
              memory: "128Mi"
            limits:
              # Fica em 500m — NÃO segue o 1000m da API de propósito: o Job é bounded, roda uma
              # vez no pré-rollout e não tem SLA de latência. O throughput da API não se aplica.
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: tmp
          emptyDir: {}
