# Pre-deploy migration Job for schema changes that are NOT safe under RollingUpdate.
#
# When a migration changes a column type (e.g. TEXT → JSONB), old pods still serving
# traffic will fail writes after the migration runs, because PostgreSQL rejects varchar
# in prepared statements targeting JSONB columns. Running this Job BEFORE the deployment
# rollout ensures all schema changes are complete before any new pod starts.
#
# This file is included in kustomization.yaml so that kustomize rewrites the
# secretKeyRef to match the hash-suffixed name generated by secretGenerator.
# NEVER apply this file directly with kubectl apply -f — use kustomize instead.
#
# Flyway is idempotent: if no pending migrations exist the Job logs and exits 0.
# ttlSecondsAfterFinished cleans up the completed pod automatically.
#
# Deploy procedure for migrations that change column types:
#
#   1. kubectl apply -k k8s/
#      # kustomize applies the Job (with correct secret name) and the Deployment.
#      # The Job starts immediately; the Deployment rollout starts in parallel.
#   2. kubectl wait --for=condition=complete job/kanban-migration \
#        --namespace kanban-vision --timeout=120s
#      # Confirm migrations completed before verifying rollout health.
#   3. kubectl rollout status deployment/kanban-vision-api -n kanban-vision
#
# See ADR-0013 and GAP-Y for rationale.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kanban-migration
  namespace: kanban-vision
  labels:
    app.kubernetes.io/name: kanban-vision-api
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kanban-vision-api
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: migrate
          image: kanban-vision-api:latest
          imagePullPolicy: IfNotPresent
          # Use -cp instead of -jar to invoke MigrationMainKt, bypassing the
          # default MainKt entry point. MigrationMainKt reads DATABASE_* env vars
          # directly, runs Flyway, closes the connection pool, and exits — Ktor
          # is never started.
          command:
            - "java"
            - "-Djava.io.tmpdir=/tmp"
            - "-cp"
            - "/app/app.jar"
            - "com.kanbanvision.httpapi.MigrationMainKt"
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: kanban-vision-config
                  key: DATABASE_URL
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: kanban-vision-config
                  key: DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kanban-vision-secret
                  key: DATABASE_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: tmp
          emptyDir: {}
