# Prometheus scrape config — in-cluster (GAP-CB / ADR-0043).
#
# Reescrito dos alvos ESTÁTICOS do compose (observability/prometheus.yml: app:8080, cadvisor:8080) para
# `kubernetes_sd_configs`, honrando as anotações `prometheus.io/scrape|port|path` do pod da API
# (k8s/03-deployment.yml) e descobrindo o cAdvisor via o cAdvisor do kubelet (não um Deployment próprio).
# Montado em /etc/prometheus/prometheus.yml pelo Deployment (k8s/10-prometheus.yml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: kanban-vision
  labels:
    app.kubernetes.io/name: kanban-vision-api
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yml

    # Entrega dos alertas ao Alertmanager in-cluster (k8s/13-alertmanager.yml, PR-3). Até ele existir,
    # o Prometheus apenas loga WARN de conexão — as regras seguem sendo avaliadas.
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]

    scrape_configs:
      # (a) API pods — pod SD honrando as anotações prometheus.io/*. O nome do job DEVE ser
      # "kanban-vision-api": a regra ServiceDown é `up{job="kanban-vision-api"} == 0`.
      - job_name: "kanban-vision-api"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [kanban-vision]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Combina o IP do pod (sem porta) com a porta da anotação → podIP:port.
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: '([^:]+)(?::\d+)?;(\d+)'
            replacement: '$1:$2'
          # instance=podIP:port — a semântica de produção (o compose fixava numa constante, GAP-BW).
          - source_labels: [__address__]
            target_label: instance
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

      # (b) cAdvisor do kubelet — via o proxy do apiserver (portável; não depende de acesso direto
      # à :10250 do nó). Exige o subrecurso `nodes/proxy` no ClusterRole (k8s/10-prometheus.yml).
      # Expõe container_* com labels namespace/pod/container — as regras Container* (11-prometheus-rules)
      # filtram por namespace="kanban-vision".
      - job_name: "kubelet-cadvisor"
        scheme: https
        kubernetes_sd_configs:
          - role: node
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          # Concessão do perfil Minikube: o kubelet serve cert self-signed. Um overlay de cluster real
          # deve remover isto e confiar na CA do kubelet.
          insecure_skip_verify: true
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
