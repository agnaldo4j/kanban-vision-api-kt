apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - 00-namespace.yml
  - 01-configmap.yml
  - 03-deployment.yml
  - 04-service.yml
  - 05-ingress.yml
  - 06-hpa.yml
  - 07-pdb.yml

# Secret is generated from k8s/secrets.env — never committed.
# Copy k8s/secrets.env.example to k8s/secrets.env and fill in real values.
# Kustomize appends a content hash to the name (e.g. kanban-vision-secret-abc123)
# and updates all references automatically. When secret values change, re-apply and
# run: kubectl rollout restart deployment/kanban-vision-api -n kanban-vision
secretGenerator:
  - name: kanban-vision-secret
    namespace: kanban-vision
    envs:
      - secrets.env

# Override image tag per environment without editing base manifests.
images:
  - name: kanban-vision-api
    newTag: "1.0.0"
