apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - 00-namespace.yml
  - 01-configmap.yml
  - 03-deployment.yml
  - 04-service.yml
  - 05-ingress.yml
  - 06-hpa.yml
  - 07-pdb.yml
  - 09-migration-job.yml
  # Observability stack (GAP-CB / ADR-0043) — adicionado incrementalmente nos PRs 1-4.
  # Esquema de numeração fixado (evita renumeração entre PRs):
  #   10-prometheus.yml         (Deployment + Service + RBAC)  — PR-2
  #   11-prometheus-rules.yml   (ConfigMap de regras)          — PR-1 (este)
  #   12-prometheus-config.yml  (ConfigMap de scrape)          — PR-2
  #   13-alertmanager.yml       (Alertmanager + alert-sink)    — PR-3
  #   14-grafana.yml            (Grafana + datasource/dashboard)— PR-4
  - 10-prometheus.yml
  - 11-prometheus-rules.yml
  - 12-prometheus-config.yml
  - 13-alertmanager.yml
  - 14-grafana.yml

# Configs de observabilidade REUSADAS de observability/* como CÓPIAS locais em k8s/ (grafana-*, alertmanager.yml)
# — de propósito: referenciar `../observability` quebraria `kubectl apply -k k8s/`, que não aceita
# `--load-restrictor` (review #333 P1). Locais ao root, como as regras e o secrets.env. O hash no nome faz uma
# mudança de config disparar rollout do Deployment. A duplicação (drift compose↔k8s) é rastreada em GAP-DB.
configMapGenerator:
  - name: alertmanager-config
    namespace: kanban-vision
    files:
      - alertmanager.yml
  - name: grafana-datasources
    namespace: kanban-vision
    files:
      - prometheus.yml=grafana-datasource-prometheus.yml
  - name: grafana-dashboards-provider
    namespace: kanban-vision
    files:
      - dashboard.yml=grafana-dashboard-provider.yml
  - name: grafana-dashboards
    namespace: kanban-vision
    files:
      - kanban-vision-api.json=grafana-dashboard.json

# Secret is generated from k8s/secrets.env — never committed.
# Copy k8s/secrets.env.example to k8s/secrets.env and fill in real values.
# Kustomize appends a content hash to the name (e.g. kanban-vision-secret-abc123)
# and updates all references automatically. When secret values change, re-apply and
# run: kubectl rollout restart deployment/kanban-vision-api -n kanban-vision
secretGenerator:
  - name: kanban-vision-secret
    namespace: kanban-vision
    envs:
      - secrets.env

# Override image tag per environment without editing base manifests.
images:
  - name: kanban-vision-api
    newTag: "1.0.0"
