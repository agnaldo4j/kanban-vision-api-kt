apiVersion: v1
kind: Secret
metadata:
  name: kanban-vision-secret
  namespace: kanban-vision
  labels:
    app.kubernetes.io/name: kanban-vision-api
type: Opaque
# stringData accepts plain-text values — Kubernetes encodes them automatically.
# Replace CHANGE_ME with real values before applying to any environment.
stringData:
  DATABASE_PASSWORD: "CHANGE_ME"
  JWT_SECRET: "CHANGE_ME"
