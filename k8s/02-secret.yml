apiVersion: v1
kind: Secret
metadata:
  name: kanban-vision-secret
  namespace: kanban-vision
  labels:
    app.kubernetes.io/name: kanban-vision-api
type: Opaque
# stringData accepts plain-text values — Kubernetes encodes them automatically.
# DO NOT commit real values. Provide these per-environment before applying:
#   kubectl create secret generic kanban-vision-secret \
#     --namespace kanban-vision \
#     --from-literal=DATABASE_PASSWORD=<value> \
#     --from-literal=JWT_SECRET=<value>
#
# Required keys:
#   DATABASE_PASSWORD  — PostgreSQL password for the kanban user
#   JWT_SECRET         — HS256 signing key for JWT tokens (min 32 chars)
