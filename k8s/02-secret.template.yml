# TEMPLATE ONLY — not referenced by kustomization.yaml and not applied by kubectl apply -k k8s/
# The Secret is created by the secretGenerator in kustomization.yaml, which reads from
# k8s/secrets.env (not committed). Copy k8s/secrets.env.example → k8s/secrets.env to get started.
#
# This file documents the expected Secret structure for reference and for environments
# that prefer kubectl create secret instead of secretGenerator.
apiVersion: v1
kind: Secret
metadata:
  name: kanban-vision-secret
  namespace: kanban-vision
  labels:
    app.kubernetes.io/name: kanban-vision-api
type: Opaque
# stringData accepts plain-text values — Kubernetes encodes them automatically.
# Required keys (provide real values — never commit them):
stringData:
  DATABASE_PASSWORD: "replace-with-real-password"
  JWT_SECRET: "replace-with-real-secret-min-32-chars"
