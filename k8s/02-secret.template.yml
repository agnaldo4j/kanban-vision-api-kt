apiVersion: v1
kind: Secret
metadata:
  name: kanban-vision-secret
  namespace: kanban-vision
  labels:
    app.kubernetes.io/name: kanban-vision-api
type: Opaque
# stringData accepts plain-text values — Kubernetes encodes them automatically.
# Replace with real values before deploying to any real environment.
# For production, prefer an external secrets manager (Vault, AWS Secrets Manager,
# Kubernetes External Secrets) or a Kustomize secretGenerator with --from-env-file.
stringData:
  DATABASE_PASSWORD: "replace-with-real-password"
  JWT_SECRET: "replace-with-real-secret-min-32-chars"
