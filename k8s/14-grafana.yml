# Grafana in-cluster (GAP-CB / ADR-0043) — a UI de visualização. Último manifesto do stack.
#
# Datasource (Prometheus), provider e o dashboard JSON são CÓPIAS locais em k8s/ (grafana-*.yml/.json),
# provisionadas via configMapGenerator (k8s/kustomization.yaml) — locais ao root p/ `apply -k` funcionar
# (review #333 P1). Traços/Tempo ficam FORA de escopo (ADR-0043): só o datasource Prometheus é provisionado.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: kanban-vision
  labels:
    app.kubernetes.io/name: kanban-vision-api
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kanban-vision-api
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kanban-vision-api
        app.kubernetes.io/component: grafana
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472        # usuário `grafana` da imagem grafana/grafana
        runAsGroup: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:11.3.0
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kanban-vision-secret
                  key: GRAFANA_ADMIN_PASSWORD
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          volumeMounts:
            # Provisioning (read-only) e o dashboard JSON — cópias locais via configMapGenerator.
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
            # /var/lib/grafana (grafana.db, plugins) e /tmp precisam ser graváveis sob readOnlyRootFilesystem.
            - name: data
              mountPath: /var/lib/grafana
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: kanban-vision
  labels:
    app.kubernetes.io/name: kanban-vision-api
    app.kubernetes.io/component: grafana
spec:
  # Nome `grafana` + porta 3000 (não a convenção <x>-svc), consistente com os demais Services de
  # observabilidade (nomes DNS do compose) — ADR-0043.
  selector:
    app.kubernetes.io/name: kanban-vision-api
    app.kubernetes.io/component: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
  type: ClusterIP
