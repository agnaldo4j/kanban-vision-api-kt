apiVersion: v1
kind: ConfigMap
metadata:
  name: kanban-vision-config
  namespace: kanban-vision
  labels:
    app.kubernetes.io/name: kanban-vision-api
# DATABASE_URL references 'postgres-svc' — deploy a PostgreSQL Service + StatefulSet
# in the same namespace, or override this value to point to an external managed DB.
data:
  PORT: "8080"
  DATABASE_URL: "jdbc:postgresql://postgres-svc:5432/kanbanvision"
  DATABASE_USER: "kanban"
  JWT_ISSUER: "kanban-vision-api"
  JWT_AUDIENCE: "kanban-vision-clients"
  JWT_TTL_MS: "86400000"
  LOG_FORMAT: "json"
  # Flyway migrations are run by the pre-deploy Job (09-migration-job.yml), not by app pods.
  # Setting this to "false" prevents races during RollingUpdate where old pods would fail
  # writes to columns whose type was changed by the migration.
  FLYWAY_ENABLED: "false"
  # OpenTelemetry — traces are disabled by default because this repo does not deploy
  # a Tempo/OTLP collector Service. To enable tracing in an environment that has a
  # collector, add a kustomization.yaml patch that sets:
  #   OTEL_TRACES_EXPORTER: "otlp"
  #   OTEL_EXPORTER_OTLP_ENDPOINT: "http://<collector-host>:<port>"
  OTEL_SERVICE_NAME: "kanban-vision-api"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=production"
  OTEL_LOGS_EXPORTER: "none"
  OTEL_METRICS_EXPORTER: "none"
  OTEL_TRACES_EXPORTER: "none"
  # CORS — defina as origens permitidas no ambiente de produção (URL completa com scheme).
  # Exemplo: "https://app.example.com,https://admin.example.com"
  # Vazio = nenhuma origem cross-origin permitida (seguro por padrão).
  CORS_ALLOWED_ORIGINS: ""
  # MAX_REQUEST_BODY_SIZE — payload size limit em bytes. Aumentar somente se endpoints
  # receberem payloads JSON maiores em produção.
  MAX_REQUEST_BODY_SIZE: "1048576"
  # TRUSTED_PROXY_COUNT — nº de reverse-proxies confiáveis à frente do pod, usado para chavear
  # o rate limit pelo IP real do cliente (imune a spoofing de X-Forwarded-For). "1" assume um
  # único Ingress à frente; ajuste para a profundidade real da cadeia (Ingress + LB + mesh).
  TRUSTED_PROXY_COUNT: "1"
