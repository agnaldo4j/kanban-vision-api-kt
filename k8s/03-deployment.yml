apiVersion: apps/v1
kind: Deployment
metadata:
  name: kanban-vision-api
  namespace: kanban-vision
  labels:
    app.kubernetes.io/name: kanban-vision-api
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: kanban-vision-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kanban-vision-api
        app.kubernetes.io/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          # Image name is overridden by kustomization.yaml `images:` — set registry
          # and tag there per environment rather than editing this base manifest.
          image: kanban-vision-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: kanban-vision-config
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kanban-vision-secret
                  key: DATABASE_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kanban-vision-secret
                  key: JWT_SECRET
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            failureThreshold: 12
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 3
          # Dimensionado por medição (ADR-0036 / GAP-BR) —
          # docs/quality/performance-baseline-2026-07-native-tuned.md
          resources:
            requests:
              # Inalterado: é o que o scheduler RESERVA. Manter em 100m é o que torna o
              # limit de 1000m abaixo gratuito em densidade.
              cpu: "100m"
              # 128Mi: pico medido de 80–92 MiB sob carga (estável em qualquer nível de CPU).
              memory: "128Mi"
            limits:
              # 500m → 1000m: +153% de throughput (785,8 → 1989,8 req/s) e p95 −60%
              # (81,7 → 32,9 ms). Sob 500m o runtime reporta Effective CPU Count = 1 e o CFS
              # estrangula o pod — era o gargalo real, não o GC. É o joelho da curva: 1→2 CPUs
              # rende só +31%. O limit é teto de burst, não reserva ⇒ não consome capacidade.
              cpu: "1000m"
              # 512Mi → 256Mi: ~2,8× de folga sobre o pico. Medido com o limite APLICADO:
              # oom_kill 0 e max 0 (nunca encostou) ⇒ o right-size custa zero throughput.
              memory: "256Mi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
