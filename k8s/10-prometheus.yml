# Prometheus in-cluster (GAP-CB / ADR-0043) — Deployment + Service + RBAC.
#
# Coleta o /metrics dos pods da API (anotações prometheus.io/*) e o cAdvisor do kubelet, avalia as
# regras (k8s/11-prometheus-rules.yml) e entrega ao Alertmanager (k8s/13-alertmanager.yml). Sem
# Operator/CRD — roda num Minikube nu. Manifesto de referência (sem cluster real no CI, como ADR-0037/0040).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: kanban-vision
  labels:
    app.kubernetes.io/name: kanban-vision-api
    app.kubernetes.io/component: prometheus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kanban-vision-prometheus
  labels:
    app.kubernetes.io/name: kanban-vision-api
    app.kubernetes.io/component: prometheus
rules:
  # `nodes`/`endpoints`/`pods`/`services` autorizam a DESCOBERTA (service discovery).
  # `nodes/proxy` autoriza o SCRAPE do cAdvisor do kubelet via o proxy do apiserver — ler `nodes`
  # sozinho só descobre o alvo; sem `nodes/proxy` um cluster com RBAC padrão devolve 403 e as 3 regras
  # de container ficam sem dado (achado de review da ADR-0043).
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "nodes/metrics", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kanban-vision-prometheus
  labels:
    app.kubernetes.io/name: kanban-vision-api
    app.kubernetes.io/component: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kanban-vision-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: kanban-vision
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: kanban-vision
  labels:
    app.kubernetes.io/name: kanban-vision-api
    app.kubernetes.io/component: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kanban-vision-api
      app.kubernetes.io/component: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kanban-vision-api
        app.kubernetes.io/component: prometheus
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534      # nobody — o usuário padrão da imagem prom/prometheus
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=7d"
            - "--web.enable-lifecycle"
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
            - name: rules
              mountPath: /etc/prometheus/rules
              readOnly: true
            - name: tsdb
              mountPath: /prometheus
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: prometheus-rules
        - name: tsdb
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: kanban-vision
  labels:
    app.kubernetes.io/name: kanban-vision-api
    app.kubernetes.io/component: prometheus
spec:
  # Nome `prometheus` + porta 9090 (não a convenção <x>-svc) para o datasource reusado do Grafana
  # (http://prometheus:9090) resolver sem alteração — exceção de nome decidida na ADR-0043.
  selector:
    app.kubernetes.io/name: kanban-vision-api
    app.kubernetes.io/component: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
      protocol: TCP
  type: ClusterIP
