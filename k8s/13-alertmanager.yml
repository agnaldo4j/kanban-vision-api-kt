# Alertmanager + alert-sink in-cluster (GAP-CB / ADR-0043) — a camada de ENTREGA dos alertas.
#
# O Prometheus (k8s/10) aponta `alerting → alertmanager:9093`; este manifesto entrega o Alertmanager e
# um `alert-sink` in-cluster (equivalente k8s do echo-sink do compose). A config do Alertmanager é reusada
# VERBATIM de observability/alertmanager.yml via `configMapGenerator` (k8s/kustomization.yaml) — cujos 3
# receivers apontam para http://alert-sink:8080/{default,critical,warning}. Sem o Service `alert-sink`
# in-cluster esses URLs não resolveriam e toda notificação falharia por DNS — o "para o vazio" que a
# ADR-0043 existe para fechar. Ambientes reais repontam os receivers p/ um notificador de verdade via overlay.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: kanban-vision
  labels:
    app.kubernetes.io/name: kanban-vision-api
    app.kubernetes.io/component: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kanban-vision-api
      app.kubernetes.io/component: alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kanban-vision-api
        app.kubernetes.io/component: alertmanager
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534      # nobody — usuário padrão da imagem prom/alertmanager
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            # config como DIRETÓRIO (sem subPath): via configMapGenerator (hash no nome) uma mudança gera
            # novo ConfigMap + rollout do Deployment, então a config nova sempre chega (lição do review #330).
            - "--config.file=/etc/alertmanager/config/alertmanager.yml"
            - "--storage.path=/alertmanager"
          ports:
            - name: http
              containerPort: 9093
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager/config
              readOnly: true
            - name: data
              mountPath: /alertmanager
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: kanban-vision
  labels:
    app.kubernetes.io/name: kanban-vision-api
    app.kubernetes.io/component: alertmanager
spec:
  # Nome `alertmanager` + porta 9093 (não a convenção <x>-svc) p/ o `alerting.alertmanagers.targets:
  # ["alertmanager:9093"]` do Prometheus (k8s/12) resolver sem alteração — exceção de nome da ADR-0043.
  selector:
    app.kubernetes.io/name: kanban-vision-api
    app.kubernetes.io/component: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: http
      protocol: TCP
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-sink
  namespace: kanban-vision
  labels:
    app.kubernetes.io/name: kanban-vision-api
    app.kubernetes.io/component: alert-sink
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kanban-vision-api
      app.kubernetes.io/component: alert-sink
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kanban-vision-api
        app.kubernetes.io/component: alert-sink
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000       # usuário `node` da imagem mendhak/http-https-echo
        runAsGroup: 1000
      containers:
        - name: alert-sink
          image: mendhak/http-https-echo:31
          env:
            - name: HTTP_PORT
              value: "8080"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            # readOnlyRootFilesystem NÃO é aplicado aqui de propósito: a imagem (Node/Express) gera um
            # certificado TLS self-signed no startup, gravando no filesystem — sob root RO ela entra em
            # crashloop. É um receiver de PROVA (não produção); as demais defesas (não-root, drop ALL,
            # sem priv-escalation) seguem. Um overlay que troque por um notificador real pode endurecer.
      # sem volumes: o echo-sink não persiste nada
---
apiVersion: v1
kind: Service
metadata:
  name: alert-sink
  namespace: kanban-vision
  labels:
    app.kubernetes.io/name: kanban-vision-api
    app.kubernetes.io/component: alert-sink
spec:
  # Nome `alert-sink` + porta 8080 EXATOS: os 3 receivers reusados de observability/alertmanager.yml
  # fazem POST em http://alert-sink:8080/{default,critical,warning} (ADR-0043 — fecha o "para o vazio").
  selector:
    app.kubernetes.io/name: kanban-vision-api
    app.kubernetes.io/component: alert-sink
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  type: ClusterIP
