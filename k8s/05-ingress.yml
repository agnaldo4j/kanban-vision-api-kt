apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kanban-vision-ingress
  namespace: kanban-vision
  labels:
    app.kubernetes.io/name: kanban-vision-api
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
spec:
  ingressClassName: nginx
  rules:
    - host: kanban-vision.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kanban-vision-svc
                port:
                  name: http
