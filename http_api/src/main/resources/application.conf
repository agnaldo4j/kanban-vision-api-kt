ktor {
    deployment {
        port = 8080
        port = ${?PORT}
        # Graceful shutdown (antes num shutdown hook manual no Main.kt)
        shutdownGracePeriod = 1000
        shutdownTimeout = 5000
    }
    application {
        modules = [ com.kanbanvision.httpapi.MainKt.module ]
    }
}

jwt {
    secret   = "dev-secret-change-in-production"
    secret   = ${?JWT_SECRET}
    issuer   = "kanban-vision-api"
    issuer   = ${?JWT_ISSUER}
    audience = "kanban-vision-clients"
    audience = ${?JWT_AUDIENCE}
    realm    = "Kanban Vision API"
    ttlMs    = 86400000
    ttlMs    = ${?JWT_TTL_MS}
}

database {
    url      = "jdbc:postgresql://localhost:5432/kanbanvision"
    url      = ${?DATABASE_URL}
    driver   = "org.postgresql.Driver"
    user     = "kanban"
    user     = ${?DATABASE_USER}
    password = "kanban"
    password = ${?DATABASE_PASSWORD}
    # Parâmetros do pool Hikari — todos com override ${?ENV} (GAP-BX). Defaults = valores
    # históricos, então sem as DATABASE_* setadas nada muda de comportamento.
    poolSize = 10
    poolSize = ${?DATABASE_POOL_SIZE}
    # minimumIdle SEM base: ausente ⇒ o Main usa poolSize (pool de tamanho fixo, comportamento
    # atual). Setar DATABASE_MIN_IDLE < poolSize torna o pool elástico (libera conexões ociosas).
    minimumIdle = ${?DATABASE_MIN_IDLE}
    connectionTimeoutMs = 30000
    connectionTimeoutMs = ${?DATABASE_CONNECTION_TIMEOUT_MS}
    maxLifetimeMs = 1800000
    maxLifetimeMs = ${?DATABASE_MAX_LIFETIME_MS}
    keepaliveTimeMs = 120000
    keepaliveTimeMs = ${?DATABASE_KEEPALIVE_TIME_MS}
    leakDetectionThresholdMs = 60000
    leakDetectionThresholdMs = ${?DATABASE_LEAK_DETECTION_THRESHOLD_MS}
}
