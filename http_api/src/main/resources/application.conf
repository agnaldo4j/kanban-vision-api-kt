ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.kanbanvision.httpapi.MainKt.module ]
    }
}

jwt {
    secret   = "dev-secret-change-in-production"
    secret   = ${?JWT_SECRET}
    issuer   = "kanban-vision-api"
    issuer   = ${?JWT_ISSUER}
    audience = "kanban-vision-clients"
    audience = ${?JWT_AUDIENCE}
    realm    = "Kanban Vision API"
    ttlMs    = 86400000
    ttlMs    = ${?JWT_TTL_MS}
}

database {
    url      = "jdbc:postgresql://localhost:5432/kanbanvision"
    url      = ${?DATABASE_URL}
    driver   = "org.postgresql.Driver"
    user     = "kanban"
    user     = ${?DATABASE_USER}
    password = "kanban"
    password = ${?DATABASE_PASSWORD}
    poolSize = 10
}
