services:

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kanban-vision-api:local
    container_name: kanban-vision-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "jdbc:postgresql://postgres:5432/kanbanvision"
      DATABASE_USER: "kanban"
      DATABASE_PASSWORD: "kanban"
      JWT_SECRET: "local-dev-secret-change-in-production"
      JWT_ISSUER: "kanban-vision-api"
      JWT_AUDIENCE: "kanban-vision-clients"
      JWT_TTL_MS: "86400000"
      JWT_DEV_MODE: "true"
      LOG_FORMAT: "json"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kanban-vision-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "kanbanvision"
      POSTGRES_USER: "kanban"
      POSTGRES_PASSWORD: "kanban"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanbanvision"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: kanban-vision-prometheus
    depends_on:
      - app
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: kanban-vision-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
