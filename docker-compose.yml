services:

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kanban-vision-api:local
    container_name: kanban-vision-app
    depends_on:
      postgres:
        condition: service_healthy
      tempo:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "jdbc:postgresql://postgres:5432/kanbanvision"
      DATABASE_USER: "kanban"
      DATABASE_PASSWORD: "kanban"
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-in-production}"
      JWT_ISSUER: "kanban-vision-api"
      JWT_AUDIENCE: "kanban-vision-clients"
      JWT_TTL_MS: "86400000"
      JWT_DEV_MODE: "${JWT_DEV_MODE:-false}"
      LOG_FORMAT: "json"
      # ── OpenTelemetry (traces exported to Grafana Tempo via OTLP gRPC) ──────
      OTEL_SERVICE_NAME: "kanban-vision-api"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4317"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=local"
      OTEL_LOGS_EXPORTER: "none"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_TRACES_EXPORTER: "otlp"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kanban-vision-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "kanbanvision"
      POSTGRES_USER: "kanban"
      POSTGRES_PASSWORD: "kanban"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanbanvision"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Grafana Tempo (distributed tracing backend) ──────────────────────────────
  tempo:
    image: grafana/tempo:2.4.1
    container_name: kanban-vision-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "3200:3200"   # Tempo HTTP API (queried by Grafana)
    volumes:
      - ./observability/tempo.yml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    restart: unless-stopped

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: kanban-vision-prometheus
    depends_on:
      - app
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: kanban-vision-grafana
    depends_on:
      - prometheus
      - tempo
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  tempo_data:
