services:

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kanban-vision-api:local
    container_name: kanban-vision-app
    depends_on:
      postgres:
        condition: service_healthy
      tempo:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "jdbc:postgresql://postgres:5432/kanbanvision"
      DATABASE_USER: "kanban"
      DATABASE_PASSWORD: "kanban"
      # Pool Hikari (GAP-BX) — configuráveis por env, defaults = valores históricos.
      # DATABASE_MIN_IDLE: chave SEM valor ⇒ passthrough do host. Exportado (ex.: DATABASE_MIN_IDLE=3)
      # entra no container; ausente ⇒ NÃO é setado (o app usa poolSize, pool fixo). Não usar a forma
      # "${DATABASE_MIN_IDLE:-}" — string vazia quebraria "".toInt(). Exporte um inteiro p/ pool elástico.
      DATABASE_POOL_SIZE: "${DATABASE_POOL_SIZE:-10}"
      DATABASE_MIN_IDLE:
      DATABASE_CONNECTION_TIMEOUT_MS: "${DATABASE_CONNECTION_TIMEOUT_MS:-30000}"
      DATABASE_MAX_LIFETIME_MS: "${DATABASE_MAX_LIFETIME_MS:-1800000}"
      DATABASE_KEEPALIVE_TIME_MS: "${DATABASE_KEEPALIVE_TIME_MS:-120000}"
      DATABASE_LEAK_DETECTION_THRESHOLD_MS: "${DATABASE_LEAK_DETECTION_THRESHOLD_MS:-60000}"
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-in-production}"
      JWT_ISSUER: "kanban-vision-api"
      JWT_AUDIENCE: "kanban-vision-clients"
      JWT_TTL_MS: "86400000"
      JWT_DEV_MODE: "${JWT_DEV_MODE:-false}"
      # ENABLE_SWAGGER — expõe /api.json e /swagger. Default off (nunca em produção — security.md §3).
      ENABLE_SWAGGER: "${ENABLE_SWAGGER:-false}"
      # CORS — lista de origens permitidas (URL completa com scheme), separadas por vírgula.
      # Vazio = nenhuma origem cross-origin permitida (comportamento padrão seguro).
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-}"
      # MAX_REQUEST_BODY_SIZE — tamanho máximo do body em bytes (default: 1MB = 1048576).
      MAX_REQUEST_BODY_SIZE: "${MAX_REQUEST_BODY_SIZE:-1048576}"
      # TRUSTED_PROXY_COUNT — nº de reverse-proxies confiáveis à frente da API para chavear o
      # rate limit por IP real. 0 = ignora X-Forwarded-For e usa o peer do socket (seguro por
      # padrão). Aqui a API é acessada direto, então 0. Testes de carga k6 usam 1.
      TRUSTED_PROXY_COUNT: "${TRUSTED_PROXY_COUNT:-0}"
      LOG_FORMAT: "json"
      # ── OpenTelemetry (traces exported to Grafana Tempo via OTLP gRPC) ──────
      OTEL_SERVICE_NAME: "kanban-vision-api"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4317"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=local"
      OTEL_LOGS_EXPORTER: "none"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_TRACES_EXPORTER: "otlp"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kanban-vision-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "kanbanvision"
      POSTGRES_USER: "kanban"
      POSTGRES_PASSWORD: "kanban"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanbanvision"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Grafana Tempo (distributed tracing backend) ──────────────────────────────
  tempo:
    image: grafana/tempo:2.4.1
    container_name: kanban-vision-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "3200:3200"   # Tempo HTTP API (queried by Grafana)
    volumes:
      - ./observability/tempo.yml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    restart: unless-stopped

  # ── Prometheus ───────────────────────────────────────────────────────────────
  # Métricas de CONTAINER (GAP-BW): throttle de CPU, working set, OOM — a camada que o
  # /metrics do app não vê. Foi a ausência dela que obrigou a medir o envelope na mão via
  # cgroup (ADR-0037) e que tornou a mitigação da ADR-0036 inobservável.
  #
  # Mounts calibrados para Docker Desktop/macOS (validado nesta máquina):
  #   - NÃO montar /var/lib/docker: o filesystem da VM é read-only ⇒ o container nem sobe.
  #   - Montar o docker.sock DIRETO, não /var/run inteiro: /var/run/docker.sock é um symlink
  #     para um caminho do macOS host que não resolve dentro da VM Linux ⇒ o cAdvisor não fala
  #     com o daemon e emite séries SEM os labels name= e image=, só id="/docker/<hash>" —
  #     inúteis para alerta, porque o hash muda a cada run.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: kanban-vision-cadvisor
    privileged: true
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: kanban-vision-prometheus
    depends_on:
      - app
      - cadvisor
      - alertmanager
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: kanban-vision-grafana
    depends_on:
      - prometheus
      - tempo
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

  # ── Alertmanager (GAP-CA) — entrega dos alertas de observability/prometheus-alerts.yml ──
  # Sem ele os 8 alertas disparavam para o vazio. Só compose: o Alertmanager in-cluster é o
  # GAP-CB [E] (não há Prometheus in-cluster ainda).
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: kanban-vision-alertmanager
    depends_on:
      - alert-sink
    ports:
      - "9093:9093"
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Alert webhook sink (GAP-CA) — receiver LOCAL sem segredo ───────────────────
  # Ecoa cada POST recebido no stdout, então `docker logs kanban-vision-alert-sink` é a prova
  # ponta-a-ponta da entrega. Troque por Slack/email conforme o comentário em
  # observability/alertmanager.yml. É o default de dev/local (produção é k8s/nativo, GAP-CB).
  alert-sink:
    image: mendhak/http-https-echo:31
    container_name: kanban-vision-alert-sink
    environment:
      HTTP_PORT: "8080"
    ports:
      - "8082:8080"   # 8081 já é do cadvisor; publish só para inspecionar o echo pelo host
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  tempo_data:
  alertmanager_data:
