config:
  validation: true
  warningsAsErrors: true

complexity:
  active: true
  CyclomaticComplexMethod:
    active: true
    allowedComplexity: 10
  CognitiveComplexMethod:
    active: true
    allowedComplexity: 15
  LongMethod:
    active: true
    allowedLines: 30
  LongParameterList:
    active: true
    allowedFunctionParameters: 5
    allowedConstructorParameters: 6
  TooManyFunctions:
    active: true
    allowedFunctionsPerFile: 15
    allowedFunctionsPerClass: 11
  LargeClass:
    active: true
    allowedLines: 200
  NestedBlockDepth:
    active: true
    allowedDepth: 4

naming:
  active: true
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'
  FunctionNaming:
    active: true
    functionPattern: '([a-z][a-zA-Z0-9]*)|(`.*`)'
  VariableNaming:
    active: true
    variablePattern: '[a-z][A-Za-z0-9]*'
  PackageNaming:
    active: true
    packagePattern: '[a-z]+(\.[a-z][A-Za-z0-9]*)*'
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'

style:
  active: true
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2']
    ignorePropertyDeclaration: true
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
  WildcardImport:
    active: true
  UnusedImport:
    active: true
  ReturnCount:
    active: true
    max: 3
  ThrowsCount:
    active: true
    max: 2
  ForbiddenImport:
    active: true
    forbiddenImports:
      - value: 'com.kanbanvision.persistence.repositories.Jdbc*'
        reason: 'Import Jdbc*Repository only in AppModule.kt (DI wiring). Depend on repository interfaces from usecases/repositories/ instead.'
    excludes: ['**/di/AppModule.kt']
  ForbiddenComment:
    active: true
    comments:
      - value: 'FIXME:'
        reason: 'Forbidden FIXME todo marker in comment — fix the problem before merging.'
      - value: 'HACK:'
        reason: 'Forbidden HACK marker in comment — refactor properly instead of working around.'
  MaxLineLength:
    active: true
    maxLineLength: 140

potential-bugs:
  active: true
  DontDowncastCollectionTypes:
    active: true
  EqualsAlwaysReturnsTrueOrFalse:
    active: true
  ExplicitGarbageCollectionCall:
    active: true
  NullableToStringCall:
    active: true
  UnreachableCode:
    active: true

performance:
  active: true
  ArrayPrimitive:
    active: true
  ForEachOnRange:
    active: true
  SpreadOperator:
    active: true

exceptions:
  active: true
  ExceptionRaisedInUnexpectedLocation:
    active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - Error
      - Exception
      - RuntimeException
      - Throwable
  TooGenericExceptionThrown:
    active: true
    exceptionNames:
      - Error
      - Exception
      - RuntimeException
      - Throwable
  SwallowedException:
    active: true
