name: Load Test (manual)

# ADR-0027: execução manual (workflow_dispatch) — NUNCA gate de PR.
# Runners compartilhados dão latência ruidosa; o baseline oficial é medido
# localmente e versionado em docs/quality/. Este workflow serve como smoke
# de performance sob demanda (antes de release/tag).

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Perfil de carga (smoke·baseline·stress·soak·spike — ver load/simulation-journey.js)'
        type: choice
        default: smoke
        options: [smoke, baseline, stress, soak, spike]

jobs:
  load-test:
    name: k6 (${{ inputs.profile }})
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Boot stack (docker compose)
        # TRUSTED_PROXY_COUNT=1: o k6 manda um X-Forwarded-For único por iteração para simular
        # clientes distintos; pós-GAP-BL a API só confia nesse XFF com 1 proxy declarado —
        # sem isso todo o tráfego colapsa numa única cota de rate limit (429 em massa).
        run: JWT_DEV_MODE=true TRUSTED_PROXY_COUNT=1 GRAFANA_ADMIN_PASSWORD=ci-only docker compose up --build -d

      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/health && exit 0
            sleep 5
          done
          echo "API did not become healthy" >&2
          docker compose logs app | tail -50 >&2 || true
          exit 1

      - name: Seed load-test organization
        run: |
          docker compose exec -T postgres psql -U kanban -d kanbanvision -c \
            "INSERT INTO organizations (id, name) VALUES
             ('11111111-1111-4111-8111-111111111111', 'k6-load-org')
             ON CONFLICT (id) DO NOTHING;"

      - name: Set up k6
        uses: grafana/setup-k6-action@v1.2.1

      - name: Execute load profile
        run: k6 run -e PROFILE=${{ inputs.profile }} --summary-export=k6-summary.json load/simulation-journey.js

      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k6-summary-${{ inputs.profile }}
          path: k6-summary.json
          retention-days: 30

      - name: Teardown
        if: always()
        run: docker compose down -v
