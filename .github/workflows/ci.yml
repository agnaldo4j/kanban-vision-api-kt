name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Configure Gradle Java home
        run: echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      - name: Run quality gates
        run: ./gradlew testAll

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
          retention-days: 14

      - name: Upload Detekt reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-reports
          path: |
            **/build/reports/detekt/
          retention-days: 14

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            **/build/reports/jacoco/
          retention-days: 14

      - name: Run PITest mutation testing
        run: ./gradlew :domain:pitest

      - name: Upload PITest mutation reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pitest-mutation-reports
          path: '**/build/reports/pitest/'
          retention-days: 14
          if-no-files-found: warn

      - name: Generate PITest mutation report
        id: pitest-report
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          {
            echo 'body<<PITEST_REPORT'
            echo '## PITest Mutation Report — `domain`'
            echo ''
            xml="domain/build/reports/pitest/mutations.xml"
            if [ ! -f "$xml" ]; then
              echo '⚠️ Mutation report not found — PITest may have failed or was skipped.'
            else
              total=$({ grep -c '<mutation ' "$xml" 2>/dev/null || true; } | tr -d '[:space:]')
              killed=$({ grep -c 'status="KILLED"' "$xml" 2>/dev/null || true; } | tr -d '[:space:]')
              survived=$({ grep -c 'status="SURVIVED"' "$xml" 2>/dev/null || true; } | tr -d '[:space:]')
              no_coverage=$({ grep -c 'status="NO_COVERAGE"' "$xml" 2>/dev/null || true; } | tr -d '[:space:]')
              timed_out=$({ grep -c 'status="TIMED_OUT"' "$xml" 2>/dev/null || true; } | tr -d '[:space:]')
              total=${total:-0}; killed=${killed:-0}; survived=${survived:-0}
              no_coverage=${no_coverage:-0}; timed_out=${timed_out:-0}
              if [ "$total" -gt 0 ]; then score=$((killed * 100 / total)); else score=0; fi
              threshold=35
              echo '| Metric | Value |'
              echo '|--------|-------|'
              printf '| Mutantes totais | %d |\n' "$total"
              printf '| ✅ Killed | %d |\n' "$killed"
              printf '| ❌ Survived | %d |\n' "$survived"
              printf '| ⚪ No coverage | %d |\n' "$no_coverage"
              [ "$timed_out" -gt 0 ] && printf '| ⏱️ Timed out | %d |\n' "$timed_out"
              echo ''
              if [ "$score" -ge "$threshold" ]; then
                printf '**Mutation score: %d%% ✅** (threshold: %d%%)\n' "$score" "$threshold"
              else
                printf '**Mutation score: %d%% ❌** (threshold: %d%%)\n' "$score" "$threshold"
              fi
              echo ''
              echo '> Target: `com.kanbanvision.domain.simulation.*` · Mutators: `STRONGER`'
            fi
            echo 'PITEST_REPORT'
          } >> "$GITHUB_OUTPUT"

      - name: Find existing PITest comment
        id: find-pitest
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## PITest Mutation Report'

      - name: Post PITest report on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-pitest.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.pitest-report.outputs.body }}
          edit-mode: replace

      - name: Test results report on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: '**/build/test-results/test/*.xml'
          comment_title: 'Test Results'
          check_name: 'Test Results'

      - name: Generate Detekt report
        id: detekt-report
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          {
            echo 'body<<DETEKT_REPORT'
            echo '## Detekt Analysis'
            echo ''
            echo '| Module | Issues |'
            echo '|--------|--------|'
            total=0
            for module in domain usecases sql_persistence http_api; do
              xml="${module}/build/reports/detekt/detekt.xml"
              if [ -f "$xml" ]; then
                count=$({ grep '<error ' "$xml" 2>/dev/null || true; } | wc -l)
              else
                count=0
              fi
              total=$((total + count))
              printf "| \`%s\` | %d |\n" "$module" "$count"
            done
            echo ''
            if [ "$total" -eq 0 ]; then
              echo '✅ **Total: 0 issues**'
            else
              printf '❌ **Total: %d issue(s)**\n' "$total"
            fi
            echo 'DETEKT_REPORT'
          } >> "$GITHUB_OUTPUT"

      - name: Find existing Detekt comment
        id: find-detekt
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Detekt Analysis'

      - name: Post Detekt report on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-detekt.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.detekt-report.outputs.body }}
          edit-mode: replace

      - name: Upload coverage to Codecov
        if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            domain/build/reports/jacoco/test/jacocoTestReport.xml,
            usecases/build/reports/jacoco/test/jacocoTestReport.xml,
            sql_persistence/build/reports/jacoco/test/jacocoTestReport.xml,
            http_api/build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests
          fail_ci_if_error: true
          verbose: true

      - name: JaCoCo coverage report on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: |
            ${{ github.workspace }}/domain/build/reports/jacoco/test/jacocoTestReport.xml,
            ${{ github.workspace }}/usecases/build/reports/jacoco/test/jacocoTestReport.xml,
            ${{ github.workspace }}/sql_persistence/build/reports/jacoco/test/jacocoTestReport.xml,
            ${{ github.workspace }}/http_api/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: JaCoCo Coverage Report
          min-coverage-overall: 90
          min-coverage-changed-files: 80
          update-comment: true

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: quality

    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern=v{{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (pull request — validate only, no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Build and push (main / tag)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
