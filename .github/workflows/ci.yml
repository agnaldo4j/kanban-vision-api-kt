name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Configure Gradle Java home
        run: echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      - name: Run quality gates
        run: ./gradlew testAll

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
          retention-days: 14

      - name: Upload Detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: |
            **/build/reports/detekt/
          retention-days: 14

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            **/build/reports/jacoco/
          retention-days: 14

      - name: Test results report on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: '**/build/test-results/test/*.xml'
          comment_title: 'Test Results'
          check_name: 'Test Results'

      - name: Generate Detekt report
        id: detekt-report
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          {
            echo 'body<<DETEKT_REPORT'
            echo '## Detekt Analysis'
            echo ''
            echo '| Module | Issues |'
            echo '|--------|--------|'
            total=0
            for module in domain usecases sql_persistence http_api; do
              xml="${module}/build/reports/detekt/detekt.xml"
              if [ -f "$xml" ]; then
                count=$({ grep '<error ' "$xml" 2>/dev/null || true; } | wc -l)
              else
                count=0
              fi
              total=$((total + count))
              printf "| \`%s\` | %d |\n" "$module" "$count"
            done
            echo ''
            if [ "$total" -eq 0 ]; then
              echo '✅ **Total: 0 issues**'
            else
              printf '❌ **Total: %d issue(s)**\n' "$total"
            fi
            echo 'DETEKT_REPORT'
          } >> "$GITHUB_OUTPUT"

      - name: Find existing Detekt comment
        id: find-detekt
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Detekt Analysis'

      - name: Post Detekt report on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-detekt.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.detekt-report.outputs.body }}
          edit-mode: replace

      - name: JaCoCo coverage report on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: |
            ${{ github.workspace }}/domain/build/reports/jacoco/test/jacocoTestReport.xml,
            ${{ github.workspace }}/usecases/build/reports/jacoco/test/jacocoTestReport.xml,
            ${{ github.workspace }}/sql_persistence/build/reports/jacoco/test/jacocoTestReport.xml,
            ${{ github.workspace }}/http_api/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: JaCoCo Coverage Report
          min-coverage-overall: 90
          min-coverage-changed-files: 80
          update-comment: true