name: CI

# Só gate reprova (GAP-CC + GAP-CD): TODO passo que publica relatório — comentário de PR
# (find-comment / create-or-update-comment), check de testes (EnricoMi), cobertura no PR
# (madrapps), upload de artefato (upload-artifact) e Codecov — leva `continue-on-error: true`.
# Nenhum é gate; nenhum tem o direito de reprovar um job cujos gates reais passaram quando a
# própria action erra contra a API do GitHub (o modo de falha do #288, com todos os gates
# verdes). A invariante é verificada por scripts/assert-ci-protection.py (step do job quality):
# passo protegido ⟺ o `uses:` dele é action de publicação de relatório. Gates reais
# (testAll, PITest, osv-scanner, build, smoke) e passos de setup NUNCA levam continue-on-error.
# Sem o comment-id do find, o post cria um comentário novo em vez de editar — degradação aceita.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Assert CI protection invariant
        # Gate (GAP-CD): report-publishing steps must carry continue-on-error; gates/setup
        # must not. Fails fast, before Java/Gradle. It is `run:`, not a reporting action —
        # so by its own rule it stays UNprotected.
        run: |
          python3 -m pip install --quiet pyyaml || pip install --quiet pyyaml
          python3 scripts/assert-ci-protection.py

      - name: Set up Java 25 (Gradle daemon)
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
        # Daemon runs on Java 25 (ADR-0024). The former Java 21 pin existed because
        # Detekt 1.23.8's embedded Kotlin compiler aborted on a Java 25 daemon
        # ("> 25.0.3"); Detekt 2.x removed that limitation. The toolchain
        # (jvmToolchain(25)) resolves to this same JDK for compilation and tests.

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run quality gates
        run: ./gradlew testAll

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
          retention-days: 14

      - name: Upload Detekt reports
        if: always()
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: detekt-reports
          path: |
            **/build/reports/detekt/
          retention-days: 14

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: coverage-reports
          path: |
            **/build/reports/jacoco/
          retention-days: 14

      - name: Upload Pact contract files
        if: always()
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: pact-contracts
          path: |
            **/build/pacts/
          retention-days: 14
          if-no-files-found: warn

      - name: Run PITest mutation testing
        run: ./gradlew pitestAll

      - name: Upload PITest mutation reports
        if: always()
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: pitest-mutation-reports
          path: '**/build/reports/pitest/'
          retention-days: 14
          if-no-files-found: warn

      - name: Generate PITest mutation report
        id: pitest-report
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          {
            echo 'body<<PITEST_REPORT'
            echo '## PITest Mutation Report'
            # module|display threshold|target — thresholds mirror the gradle gates
            for spec in \
              'domain-common|90|com.kanbanvision.domain.common.*' \
              'domain-kanban|78|com.kanbanvision.domain.model.{kanban,organization}.*' \
              'domain-simulation|73|com.kanbanvision.domain.*' \
              'usecases|55|com.kanbanvision.usecases.*' \
              'sql_persistence|65|com.kanbanvision.persistence.*' \
              'http_api|45|com.kanbanvision.httpapi.{plugins,adapters,events}.*'; do
              module=${spec%%|*}; rest=${spec#*|}
              threshold=${rest%%|*}; target=${rest#*|}
              echo ''
              printf '### `%s`\n' "$module"
              echo ''
              xml="${module}/build/reports/pitest/mutations.xml"
              if [ ! -f "$xml" ]; then
                echo '⚠️ Mutation report not found — PITest may have failed or was skipped.'
                continue
              fi
              total=$({ grep -c '<mutation ' "$xml" 2>/dev/null || true; } | tr -d '[:space:]')
              killed=$({ grep -c "status='KILLED'" "$xml" 2>/dev/null || true; } | tr -d '[:space:]')
              survived=$({ grep -c "status='SURVIVED'" "$xml" 2>/dev/null || true; } | tr -d '[:space:]')
              no_coverage=$({ grep -c "status='NO_COVERAGE'" "$xml" 2>/dev/null || true; } | tr -d '[:space:]')
              timed_out=$({ grep -c "status='TIMED_OUT'" "$xml" 2>/dev/null || true; } | tr -d '[:space:]')
              total=${total:-0}; killed=${killed:-0}; survived=${survived:-0}
              no_coverage=${no_coverage:-0}; timed_out=${timed_out:-0}
              # Score na semântica do PITest (gate do Gradle): timeouts contam como kill.
              if [ "$total" -gt 0 ]; then score=$(((killed + timed_out) * 100 / total)); else score=0; fi
              echo '| Metric | Value |'
              echo '|--------|-------|'
              printf '| Mutantes totais | %d |\n' "$total"
              printf '| ✅ Killed | %d |\n' "$killed"
              printf '| ❌ Survived | %d |\n' "$survived"
              printf '| ⚪ No coverage | %d |\n' "$no_coverage"
              [ "$timed_out" -gt 0 ] && printf '| ⏱️ Timed out | %d |\n' "$timed_out"
              echo ''
              if [ "$score" -ge "$threshold" ]; then
                printf '**Mutation score: %d%% ✅** (threshold: %d%%)\n' "$score" "$threshold"
              else
                printf '**Mutation score: %d%% ❌** (threshold: %d%%)\n' "$score" "$threshold"
              fi
              echo ''
              printf '> Target: `%s` · Mutators: `STRONGER`\n' "$target"
            done
            echo 'PITEST_REPORT'
          } >> "$GITHUB_OUTPUT"

      - name: Find existing PITest comment
        id: find-pitest
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/find-comment@v4
        continue-on-error: true
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## PITest Mutation Report'

      - name: Post PITest report on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/create-or-update-comment@v5
        continue-on-error: true
        with:
          comment-id: ${{ steps.find-pitest.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.pitest-report.outputs.body }}
          edit-mode: replace

      - name: Generate architecture fitness report
        id: architecture-report
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          {
            echo 'body<<ARCHITECTURE_REPORT'
            echo '## Architecture Fitness Report'
            echo ''
            dir="architecture/build/test-results/test"
            if ! ls "$dir"/TEST-*.xml >/dev/null 2>&1; then
              echo '⚠️ Fitness function results not found — :architecture:test may have failed to run.'
            else
              echo '| Fitness function | Suite | Status |'
              echo '|------------------|-------|--------|'
              total=0; passed=0
              for xml in "$dir"/TEST-*.xml; do
                suite=$(basename "$xml" .xml | sed 's/^TEST-com\.kanbanvision\.architecture\.//')
                while IFS= read -r line; do
                  name=$(printf '%s' "$line" | sed -E 's/.*<testcase name="([^"]*)".*/\1/; s/\(\)$//')
                  total=$((total + 1))
                  # testcase self-closing ("/>") = pass; aberto = contém <failure>/<error>
                  case "$line" in
                    */\>) status='✅'; passed=$((passed + 1)) ;;
                    *) status='❌' ;;
                  esac
                  printf '| %s | `%s` | %s |\n' "$name" "$suite" "$status"
                done < <(grep '<testcase ' "$xml")
              done
              echo ''
              if [ "$passed" -eq "$total" ]; then
                printf '**%d/%d fitness functions ✅**\n' "$passed" "$total"
              else
                printf '**%d/%d fitness functions ✅ — %d violação(ões) de arquitetura ❌**\n' "$passed" "$total" "$((total - passed))"
              fi
              echo ''
              echo '> Konsist (ADR-0026): Dependency Rule hexagonal · pureza do domain · placement dos ports'
            fi
            echo 'ARCHITECTURE_REPORT'
          } >> "$GITHUB_OUTPUT"

      - name: Find existing architecture fitness comment
        id: find-architecture
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/find-comment@v4
        continue-on-error: true
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Architecture Fitness Report'

      - name: Post architecture fitness report on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/create-or-update-comment@v5
        continue-on-error: true
        with:
          comment-id: ${{ steps.find-architecture.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.architecture-report.outputs.body }}
          edit-mode: replace

      - name: Test results report on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: EnricoMi/publish-unit-test-result-action@v2
        continue-on-error: true
        with:
          files: '**/build/test-results/test/*.xml'
          comment_title: 'Test Results'
          check_name: 'Test Results'

      - name: Generate Detekt report
        id: detekt-report
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          {
            echo 'body<<DETEKT_REPORT'
            echo '## Detekt Analysis'
            echo ''
            echo '| Module | main | test |'
            echo '|--------|------|------|'
            total=0
            for module in domain-simulation usecases sql_persistence http_api; do
              xml="${module}/build/reports/detekt/detekt.xml"
              xml_test="${module}/build/reports/detekt/test.xml"
              if [ -f "$xml" ]; then
                count=$({ grep -c '<error ' "$xml" 2>/dev/null || true; } | tr -d '[:space:]')
              else
                count=0
              fi
              if [ -f "$xml_test" ]; then
                count_test=$({ grep -c '<error ' "$xml_test" 2>/dev/null || true; } | tr -d '[:space:]')
              else
                count_test=0
              fi
              total=$((total + count + count_test))
              printf "| \`%s\` | %d | %d |\n" "$module" "$count" "$count_test"
            done
            echo ''
            if [ "$total" -eq 0 ]; then
              echo '✅ **Total: 0 issues** (main + test sources)'
            else
              printf '❌ **Total: %d issue(s)** (main + test sources)\n' "$total"
            fi
            echo 'DETEKT_REPORT'
          } >> "$GITHUB_OUTPUT"

      - name: Find existing Detekt comment
        id: find-detekt
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/find-comment@v4
        continue-on-error: true
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Detekt Analysis'

      - name: Post Detekt report on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/create-or-update-comment@v5
        continue-on-error: true
        with:
          comment-id: ${{ steps.find-detekt.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.detekt-report.outputs.body }}
          edit-mode: replace

      - name: Upload coverage to Codecov
        if: always() && (github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request')
        uses: codecov/codecov-action@v7
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # Linha única: o bloco YAML ">-" junta linhas com espaço e o action
          # separa por vírgula — paths com espaço inicial não são encontrados
          # (só o domain subia; usecases/sql_persistence/http_api eram ignorados).
          files: domain-common/build/reports/jacoco/test/jacocoTestReport.xml,domain-kanban/build/reports/jacoco/test/jacocoTestReport.xml,domain-simulation/build/reports/jacoco/test/jacocoTestReport.xml,usecases/build/reports/jacoco/test/jacocoTestReport.xml,sql_persistence/build/reports/jacoco/test/jacocoTestReport.xml,http_api/build/reports/jacoco/test/jacocoTestReport.xml
          disable_search: true
          codecov_yml_path: ./codecov.yml
          flags: unittests
          fail_ci_if_error: false
          verbose: true

      - name: JaCoCo coverage report on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: madrapps/jacoco-report@v1.8.0
        continue-on-error: true
        with:
          paths: |
            ${{ github.workspace }}/domain-common/build/reports/jacoco/test/jacocoTestReport.xml,
            ${{ github.workspace }}/domain-kanban/build/reports/jacoco/test/jacocoTestReport.xml,
            ${{ github.workspace }}/domain-simulation/build/reports/jacoco/test/jacocoTestReport.xml,
            ${{ github.workspace }}/usecases/build/reports/jacoco/test/jacocoTestReport.xml,
            ${{ github.workspace }}/sql_persistence/build/reports/jacoco/test/jacocoTestReport.xml,
            ${{ github.workspace }}/http_api/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: JaCoCo Coverage Report
          min-coverage-overall: 98
          min-coverage-changed-files: 98
          update-comment: true

  supply-chain:
    name: Supply Chain (SBOM + SCA)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java 25 (Gradle daemon)
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Generate SBOM (CycloneDX)
        run: ./gradlew cyclonedxBom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: sbom-cyclonedx
          path: build/reports/cyclonedx/
          retention-days: 14

      - name: Scan SBOM for known vulnerabilities (osv-scanner)
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          # Gate bloqueante (ADR-0025): exit code != 0 em CVE conhecida falha o job.
          # Exceções somente via osv-scanner.toml com reason documentada.
          # --output preserva o exit code; o markdown vira comentário no PR.
          scan-args: |-
            --config=osv-scanner.toml
            --format
            markdown
            --output
            osv-report.md
            -L
            build/reports/cyclonedx/bom.json

      - name: Generate supply chain report
        id: supply-chain-report
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          {
            echo 'body<<SUPPLY_CHAIN_REPORT'
            echo '## Supply Chain Report — SBOM + SCA'
            echo ''
            bom="build/reports/cyclonedx/bom.json"
            if [ -f "$bom" ]; then
              components=$(jq '.components | length' "$bom" 2>/dev/null || echo 0)
            else
              components=0
            fi
            ignores=$({ grep -c '^\[\[IgnoredVulns\]\]' osv-scanner.toml 2>/dev/null || true; } | tr -d '[:space:]')
            echo '| Metric | Value |'
            echo '|--------|-------|'
            printf '| Componentes no SBOM (runtimeClasspath) | %s |\n' "$components"
            printf '| Exceções ativas (`osv-scanner.toml`) | %s |\n' "${ignores:-0}"
            echo ''
            if [ ! -f osv-report.md ]; then
              echo '⚠️ Scan report not found — osv-scanner may have failed before producing output.'
            elif grep -q 'No issues found' osv-report.md; then
              echo '✅ **No known vulnerabilities** (base OSV.dev)'
            else
              echo '❌ **Vulnerabilidades conhecidas encontradas** — gate bloqueante (ADR-0025):'
              echo ''
              cat osv-report.md
            fi
            echo ''
            echo '> SBOM: artifact `sbom-cyclonedx` · Scanner: osv-scanner v2.3.8 · Gate: ADR-0025'
            echo 'SUPPLY_CHAIN_REPORT'
          } >> "$GITHUB_OUTPUT"

      - name: Find existing supply chain comment
        id: find-supply-chain
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/find-comment@v4
        continue-on-error: true
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Supply Chain Report'

      - name: Post supply chain report on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/create-or-update-comment@v5
        continue-on-error: true
        with:
          comment-id: ${{ steps.find-supply-chain.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.supply-chain-report.outputs.body }}
          edit-mode: replace

  pr-size:
    name: PR Size Soft-Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Generate PR size report
        id: pr-size-report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Count changed lines (additions + deletions) via the GitHub API — no checkout needed.
          # Committed GraalVM reachability metadata is auto-generated and excluded from the count.
          # Soft-gate (GAP-BH): warn only, never fail the build.
          # Falha do gh api — ou resposta vazia com exit 0, que o #288 provou ser possível quando a
          # API do GitHub degrada — vira "unavailable" (GAP-CC). Nunca reprova o job, e nunca deixa
          # uma contagem ausente virar um "✅ Within the 400-line heuristic" fabricado: um ✅ falso
          # é pior que a ausência do sinal. Um PR real sempre muda ao menos um arquivo.
          if ! gh api --paginate \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --jq '.[] | [.filename, (.additions + .deletions)] | @tsv' > files.tsv \
             || [ ! -s files.tsv ]
          then
            {
              echo 'body<<PR_SIZE_REPORT'
              echo '## PR Size Report'
              echo ''
              echo '_PR size unavailable for this run._'
              echo 'PR_SIZE_REPORT'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          counted=$(awk -F'\t' '$1 !~ /\/META-INF\/native-image\// {s+=$2} END {print s+0}' files.tsv)
          excluded=$(awk -F'\t' '$1 ~ /\/META-INF\/native-image\// {s+=$2} END {print s+0}' files.tsv)
          threshold=400
          {
            echo 'body<<PR_SIZE_REPORT'
            echo '## PR Size Report'
            echo ''
            echo '| Metric | Value |'
            echo '|--------|-------|'
            printf '| Changed lines (counted) | %d |\n' "$counted"
            printf '| Excluded (reachability metadata) | %d |\n' "$excluded"
            printf '| Threshold | %d |\n' "$threshold"
            echo ''
            if [ "$counted" -le "$threshold" ]; then
              echo '✅ Within the 400-line heuristic.'
            else
              echo '⚠️ **This PR exceeds the 400-line heuristic — consider splitting.** (non-blocking)'
            fi
            echo 'PR_SIZE_REPORT'
          } >> "$GITHUB_OUTPUT"

      - name: Find existing PR size comment
        id: find-pr-size
        uses: peter-evans/find-comment@v4
        continue-on-error: true
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## PR Size Report'

      - name: Post PR size report on PR
        uses: peter-evans/create-or-update-comment@v5
        continue-on-error: true
        with:
          comment-id: ${{ steps.find-pr-size.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.pr-size-report.outputs.body }}
          edit-mode: replace

  flow-metrics:
    name: Flow Metrics
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Generate flow metrics report
        id: flow-report
        env:
          # Data reads (PR history + board WIP). WIP needs a PAT with read:project;
          # falls back to GITHUB_TOKEN, in which case flow-metrics.sh degrades the
          # WIP line to "unavailable" (it still reports cycle/lead/cadence/size).
          GH_TOKEN: ${{ secrets.FLOW_PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # Rolling engineering-flow snapshot (GAP-BI) — non-blocking signal that
          # reuses scripts/flow-metrics.sh, the same source as docs/quality/flow-*.md.
          report="$(bash scripts/flow-metrics.sh 2>&1)" || report="_Flow metrics unavailable for this run._"
          {
            echo 'body<<FLOW_REPORT'
            echo '## Flow Metrics Report'
            echo ''
            echo "$report"
            echo ''
            echo '> Rolling snapshot over recent merged PRs (non-blocking) — source: `scripts/flow-metrics.sh` (GAP-BI).'
            echo 'FLOW_REPORT'
          } >> "$GITHUB_OUTPUT"

      - name: Find existing flow metrics comment
        id: find-flow
        uses: peter-evans/find-comment@v4
        continue-on-error: true
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Flow Metrics Report'

      - name: Post flow metrics report on PR
        uses: peter-evans/create-or-update-comment@v5
        continue-on-error: true
        with:
          comment-id: ${{ steps.find-flow.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.flow-report.outputs.body }}
          edit-mode: replace

  config-lint:
    name: Config Lint (Alertmanager + Prometheus)
    runs-on: ubuntu-latest

    # Gate bloqueante (GAP-CY): valida o SCHEMA SEMÂNTICO dos configs de observabilidade —
    # a classe de bug que um parser YAML genérico não pega (o P2 do PR #317: inhibit_rules
    # com equal:['instance','name']). amtool/promtool entendem o schema; YAML puro não.
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve pinned tool versions from docker-compose
        # Linta com as MESMAS versões fixadas no runtime (docker-compose.yml) — sem drift
        # silencioso quando um bump mudar a imagem. Setup/gate step: sem continue-on-error.
        run: |
          AM_VER="$(grep -oE 'prom/alertmanager:[^"[:space:]]+' docker-compose.yml | head -1 | cut -d: -f2)"
          PROM_VER="$(grep -oE 'prom/prometheus:[^"[:space:]]+' docker-compose.yml | head -1 | cut -d: -f2)"
          if [ -z "$AM_VER" ] || [ -z "$PROM_VER" ]; then
            echo "::error::Não foi possível resolver prom/alertmanager|prom/prometheus em docker-compose.yml"
            exit 1
          fi
          echo "AM_VER=$AM_VER" >> "$GITHUB_ENV"
          echo "PROM_VER=$PROM_VER" >> "$GITHUB_ENV"

      - name: Lint observability configs (amtool + promtool)
        id: lint
        # Captura saída/status SEM derrubar o job aqui (padrão captura→report→gate do smoke
        # test); quem reprova é o step 'Fail if any config is invalid'. Assim o comentário
        # sticky é postado mesmo em falha. promtool check config exige que rule_files
        # (/etc/prometheus/prometheus-alerts.yml) resolva — daí o segundo mount.
        run: |
          set +e
          declare -a ROWS=()
          OUTLOG=""
          passed=true

          # Pré-baixa as imagens em silêncio: sem isso o progresso de pull ('Pulling fs
          # layer'…) entra no OUTLOG capturado (docker run 2>&1) e, no caminho de FALHA,
          # soterraria o erro real do amtool/promtool.
          docker pull -q "prom/alertmanager:$AM_VER"
          docker pull -q "prom/prometheus:$PROM_VER"

          run_check() {
            local name="$1"; shift
            local out rc
            out="$(docker run --rm "$@" 2>&1)"; rc=$?
            if [ "$rc" -eq 0 ]; then
              ROWS+=("| $name | ✅ pass |")
            else
              ROWS+=("| $name | ❌ fail (exit $rc) |")
              passed=false
            fi
            OUTLOG+=$'\n'"### $name"$'\n\n```\n'"$out"$'\n```\n'
          }

          run_check "amtool check-config · alertmanager.yml" \
            --entrypoint amtool -v "$PWD/observability:/cfg" \
            "prom/alertmanager:$AM_VER" check-config /cfg/alertmanager.yml

          run_check "promtool check config · prometheus.yml" \
            --entrypoint promtool \
            -v "$PWD/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro" \
            -v "$PWD/observability/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro" \
            "prom/prometheus:$PROM_VER" check config /etc/prometheus/prometheus.yml

          run_check "promtool check rules · prometheus-alerts.yml" \
            --entrypoint promtool \
            -v "$PWD/observability/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro" \
            "prom/prometheus:$PROM_VER" check rules /etc/prometheus/prometheus-alerts.yml

          {
            echo 'body<<CONFIG_LINT_REPORT'
            echo '## Config Lint Report'
            echo ''
            echo "Valida \`observability/*.yml\` com **amtool** (\`prom/alertmanager:$AM_VER\`) e **promtool** (\`prom/prometheus:$PROM_VER\`) — versões fixadas no \`docker-compose.yml\`."
            echo ''
            echo '| Check | Resultado |'
            echo '|-------|-----------|'
            printf '%s\n' "${ROWS[@]}"
            echo ''
            if [ "$passed" = true ]; then
              echo '✅ Todos os configs de observabilidade são válidos.'
            else
              echo '❌ **Config de observabilidade inválida — este job reprova o CI.** Veja a saída abaixo.'
            fi
            echo ''
            echo '<details><summary>Saída dos linters</summary>'
            echo ''
            echo "$OUTLOG"
            echo '</details>'
            echo ''
            echo '> Gate bloqueante — config-lint (GAP-CY). Reproduza local: ver `.claude/skills/opentelemetry/SKILL.md`.'
            echo 'CONFIG_LINT_REPORT'
          } >> "$GITHUB_OUTPUT"
          echo "passed=$passed" >> "$GITHUB_OUTPUT"

          # Espelha no log do job — visibilidade independente do comentário.
          printf '%s\n' "${ROWS[@]}"
          printf '%s\n' "$OUTLOG"

      - name: Find existing config lint comment
        id: find-config-lint
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v4
        continue-on-error: true
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Config Lint Report'

      - name: Post config lint report on PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5
        continue-on-error: true
        with:
          comment-id: ${{ steps.find-config-lint.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.lint.outputs.body }}
          edit-mode: replace

      - name: Fail if any config is invalid
        # Gate real (bloqueante) — só depende do resultado do lint; `run:`, sem continue-on-error.
        run: |
          if [ "${{ steps.lint.outputs.passed }}" != "true" ]; then
            echo "::error::Config de observabilidade inválida — veja o step 'Lint observability configs' e o comentário Config Lint Report."
            exit 1
          fi
          echo "Todos os configs de observabilidade são válidos."

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [quality, supply-chain]

    permissions:
      contents: read
      packages: write
      actions: write
      pull-requests: write # postar o Smoke Test Report como comentário do PR

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern=v{{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (pull request — validate only, no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true # imagem no daemon local — o smoke test abaixo executa o container
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Smoke test the image (boot + contract probes)
        id: smoke
        if: github.event_name == 'pull_request'
        # O CI construía a imagem mas nunca a EXECUTAVA — classe de bug que acumulou
        # 5 falhas de runtime invisíveis até o GAP-AR (PR #225). Este gate sobe o
        # container nativo contra um postgres efêmero, exige readiness (boot + Flyway + DB)
        # e roda probes de contrato — inclusive um caminho de erro que serializa
        # DomainErrorResponse no Native Image (reachability metadata — cf. GAP-BM).
        run: |
          set -uo pipefail
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          IMAGE_BYTES=$(docker image inspect "$IMAGE" --format '{{.Size}}' 2>/dev/null || echo 0)
          IMAGE_MB=$(( IMAGE_BYTES / 1024 / 1024 ))
          docker network create smoke
          docker run -d --name smoke-pg --network smoke \
            -e POSTGRES_DB=kanbanvision -e POSTGRES_USER=kanban -e POSTGRES_PASSWORD=kanban \
            postgres:16-alpine
          PG_READY=0
          for i in $(seq 1 30); do
            docker exec smoke-pg pg_isready -U kanban >/dev/null 2>&1 && { PG_READY=1; break; }
            sleep 2
          done
          [ "$PG_READY" -eq 1 ] || { echo "Postgres não ficou pronto em 60s" >&2; docker logs smoke-pg >&2 || true; }

          START=$(date +%s)
          docker run -d --name smoke-app --network smoke -p 8080:8080 \
            -e DATABASE_URL=jdbc:postgresql://smoke-pg:5432/kanbanvision \
            -e DATABASE_USER=kanban -e DATABASE_PASSWORD=kanban \
            -e OTEL_TRACES_EXPORTER=none -e OTEL_METRICS_EXPORTER=none -e OTEL_LOGS_EXPORTER=none \
            "$IMAGE"
          READY=0; READY_DETAIL="timeout após 120s"
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8080/health/ready >/dev/null 2>&1; then
              READY=1; READY_DETAIL="200 em $(( $(date +%s) - START ))s"; break
            fi
            sleep 3
          done

          FAILED=0
          ROWS=""
          add_row() { # $1 probe  $2 esperado  $3 obtido  $4 pass(0/1)
            local mark; [ "$4" -eq 0 ] && mark='✅' || { mark='❌'; FAILED=1; }
            ROWS="${ROWS}| $1 | $2 | $3 | ${mark} |"$'\n'
          }

          add_row "Boot + readiness (\`/health/ready\`)" "200" "$READY_DETAIL" "$([ "$READY" -eq 1 ] && echo 0 || echo 1)"

          if [ "$READY" -eq 1 ]; then
            LV=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/health/live || echo 000)
            add_row "Liveness (\`/health/live\`)" "200" "$LV" "$([ "$LV" = "200" ] && echo 0 || echo 1)"

            # Sem token: challenge 401 serializa DomainErrorResponse (kotlinx) no binário nativo.
            EP="http://localhost:8080/api/v1/simulations/smoke-test"
            CODE=$(curl -s -o /dev/null -w '%{http_code}' "$EP" || echo 000)
            BODY=$(curl -s "$EP" || true)
            if [ "$CODE" = "401" ] && printf '%s' "$BODY" | grep -q '"error"'; then
              add_row "Auth + serialização de erro (sem token → \`DomainErrorResponse\`)" "401 + JSON" "401 · corpo JSON com \`error\`" 0
            else
              add_row "Auth + serialização de erro (sem token → \`DomainErrorResponse\`)" "401 + JSON" "code=$CODE corpo=$(printf '%s' "$BODY" | head -c 60)" 1
            fi
          fi

          STATUS=$([ "$FAILED" -eq 0 ] && echo '✅ Passou' || echo '❌ Falhou')
          {
            echo 'body<<SMOKE_REPORT'
            echo '## Smoke Test Report'
            echo ''
            echo "**Status:** ${STATUS} · **Imagem:** \`${IMAGE}\` — ${IMAGE_MB} MB (GraalVM Native Image)"
            echo ''
            echo '| Probe | Esperado | Obtido | |'
            echo '|---|---|---|:-:|'
            printf '%s' "$ROWS"
            echo ''
            echo '> Sobe o binário nativo contra um Postgres efêmero (boot + Flyway + DB). O probe de'
            echo '> erro exercita a serialização de `DomainErrorResponse` no Native Image — reachability'
            echo '> metadata (cf. GAP-BM). Gate bloqueante: falha de probe reprova o job.'
            echo 'SMOKE_REPORT'
          } >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -ne 0 ] || [ "$READY" -ne 1 ]; then
            echo "Smoke FAILED — app logs:" >&2; docker logs smoke-app >&2 || true
            exit 1
          fi
          echo "SMOKE OK"

      - name: Find existing smoke test comment
        if: always() && github.event_name == 'pull_request'
        id: find-smoke
        uses: peter-evans/find-comment@v4
        continue-on-error: true
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Smoke Test Report'

      - name: Post smoke test report on PR
        if: always() && github.event_name == 'pull_request' && steps.smoke.outputs.body != ''
        uses: peter-evans/create-or-update-comment@v5
        continue-on-error: true
        with:
          comment-id: ${{ steps.find-smoke.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.smoke.outputs.body }}
          edit-mode: replace

      - name: Smoke test teardown
        if: always() && github.event_name == 'pull_request'
        run: |
          docker rm -f smoke-app smoke-pg 2>/dev/null || true
          docker network rm smoke 2>/dev/null || true

      - name: Build and push (main / tag)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
