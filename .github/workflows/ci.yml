name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Configure Gradle Java home
        run: echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      - name: Run quality gates
        run: ./gradlew testAll

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
          retention-days: 14

      - name: Upload Detekt reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-reports
          path: |
            **/build/reports/detekt/
          retention-days: 14

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            **/build/reports/jacoco/
          retention-days: 14

      - name: JaCoCo coverage report on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: |
            ${{ github.workspace }}/domain/build/reports/jacoco/test/jacocoTestReport.xml,
            ${{ github.workspace }}/usecases/build/reports/jacoco/test/jacocoTestReport.xml,
            ${{ github.workspace }}/sql_persistence/build/reports/jacoco/test/jacocoTestReport.xml,
            ${{ github.workspace }}/http_api/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: JaCoCo Coverage Report
          min-coverage-overall: 90
          min-coverage-changed-files: 80
          update-comment: true