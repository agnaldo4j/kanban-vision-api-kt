name: PR Review Harness (advisory)

# Revisão criteriosa de PR pelo harness do projeto (skill /pr-review → agente pr-harness), GAP-CS.
# Advisory: NUNCA entra em branch-protection; complementa o Codex e os gates de CI — NÃO os re-roda.
# Requer o secret ANTHROPIC_API_KEY; sem ele o job é pulado com aviso (jamais derruba o PR).
#
# Dispara por `workflow_run` APÓS a conclusão do workflow `CI` (GAP-CT), não em paralelo a ele: o `CI`
# termina no job `build` (needs: quality + supply-chain), então quando este workflow roda TODOS os
# relatórios de CI (Detekt/JaCoCo/PITest/Konsist/SCA/smoke) já estão postados no head SHA — o harness
# sempre cruza os resultados do commit atual, em vez de emitir veredito com a seção vazia/stale.
#
# Benefício de segurança do `workflow_run`: o workflow roda a partir da DEFAULT branch (rubric
# confiável por construção). A única entrada untrusted é o TEXTO do diff, lido como input via
# `gh pr diff`. Isso subsume o antigo passo de "pin rubric" e o guard anti-fork do gatilho pull_request.

on:
  workflow_run:
    workflows: ["CI"] # nome exato do workflow em ci.yml (`name: CI`)
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  id-token: write # a claude-code-action@v1 troca um OIDC token pelo token de app do GitHub

concurrency:
  # Não há `pull_request.number` no evento workflow_run — chaveia pela branch de origem do CI.
  group: pr-review-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  harness:
    name: pr-harness review
    runs-on: ubuntu-latest
    # Só quando o `CI` que concluiu era de um PR DO PRÓPRIO REPO (nunca fork nem push em main/tags).
    # - event == 'pull_request'          → ignora execuções do CI por push em main / tags.
    # - head_repository == repository    → mantém "só same-repo" (o rubric agora vem da default, mas
    #                                       preservamos o guard: forks não recebem harness, ficam com
    #                                       o Codex + gates de CI).
    # - conclusion != cancelled/skipped  → run superseeded por novo push gera um novo CI → novo harness.
    #                                       Roda em success E failure: cruzar falhas de CI é o valor do harness.
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.conclusion != 'cancelled' &&
      github.event.workflow_run.conclusion != 'skipped'
    # HAS_KEY: secrets só podem ser lidos no contexto env (não em `if:` de job) — este seam permite
    # pular graciosamente quando ANTHROPIC_API_KEY não está configurado.
    env:
      HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - name: Resolve PR number from head SHA
        id: pr
        if: env.HAS_KEY == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # O evento workflow_run não carrega o número do PR de forma confiável (`pull_requests` é
          # notoriamente instável / vazio). Derivar pelo head SHA via API é preciso: retorna o PR
          # aberto associado ao commit exato que o CI avaliou.
          n=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" \
                --jq '[.[] | select(.state == "open")][0].number' 2>/dev/null || true)
          if [ -z "$n" ] || [ "$n" = "null" ]; then
            echo "Nenhum PR aberto para o SHA ${{ github.event.workflow_run.head_sha }} — nada a revisar." >&2
            echo "number=" >> "$GITHUB_OUTPUT"
          else
            echo "Resolved PR #$n para o SHA ${{ github.event.workflow_run.head_sha }}."
            echo "number=$n" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout (default branch — trusted rubric)
        if: env.HAS_KEY == 'true' && steps.pr.outputs.number != ''
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Em workflow_run o checkout default JÁ é a default branch: a rubrica do revisor
          # (agente/skill/regras/CLAUDE.md/políticas) é confiável por construção, sem o antigo passo de
          # "pin rubric" (git checkout FETCH_HEAD). O diff do PR é lido só como INPUT via `gh pr diff`
          # dentro do harness — nunca como instrução —, então um PR não consegue reescrever o revisor.

      - name: Run PR harness
        if: env.HAS_KEY == 'true' && steps.pr.outputs.number != ''
        continue-on-error: true # advisory: um erro transitório da API não derruba o PR
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Rode a skill /pr-review sobre este pull request (#${{ steps.pr.outputs.number }}),
            atuando como o agente pr-harness (.claude/agents/pr-harness.md): parecer criterioso ancorado
            nas skills, nos guards de qualidade, na Dependency Rule/fronteiras de contexto, no gap-type,
            no DoD e na coerência de negócio. NÃO re-rode os gates de CI (Detekt/JaCoCo/PITest/Konsist/
            osv) — cruze os resultados já postados. Ranqueie os achados P1/P2/P3 e dê um veredito
            (BLOCK/CHANGES-REQUESTED/APPROVE). Inclua também, quando houver algo fundamentado, as seções
            "Melhorias sugeridas" e "Direcionamento estratégico" (§3.5 do rubric): ancore em artefatos
            in-repo — ADR-0038, docs/context-map.md (seams ACL/OHS), docs/quality/scorecard-*.md; sobre o
            board, você aqui NÃO tem token de projeto, então sugira próximos passos como candidatos ao
            Todo sem afirmar o estado do board. Ambas as seções são OPCIONAIS e NÃO mudam o veredito —
            omita-as se nada substantivo. Poste o parecer como um comentário do PR começando com o título
            exato "## PR Review Harness".
          claude_args: |
            --max-turns 25
            --allowedTools Bash,Read,Grep,Glob

      - name: Skipped (no API key)
        if: env.HAS_KEY != 'true'
        run: |
          echo "ANTHROPIC_API_KEY não configurado no repo — harness advisory pulado." >&2
          echo "Adicione o secret (Settings → Secrets → Actions) para ativar. Não bloqueia o PR."
