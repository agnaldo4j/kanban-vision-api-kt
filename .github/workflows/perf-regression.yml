name: Performance Regression (scheduled)

# ADR-0039: sinal AGENDADO de regressão de performance — NUNCA gate de PR.
# Só dispara em schedule/workflow_dispatch (jamais pull_request/push), então é
# estruturalmente incapaz de bloquear um merge. Compara a run do perfil `baseline`
# contra uma referência MEDIDA NO CI (load/ci-reference-summary.json) com tolerâncias
# LARGAS (runner compartilhado é ruidoso, ADR-0027). O baseline oficial continua sendo
# o número LOCAL versionado em docs/quality/ — esta referência de CI é um tripwire grosseiro.

on:
  schedule:
    - cron: '0 6 * * 1'   # segunda-feira 06:00 UTC (semanal)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perf-regression:
    name: k6 baseline vs CI reference
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # env no nível do job: TODO comando `docker compose` re-interpola o arquivo inteiro (o serviço
    # grafana exige GRAFANA_ADMIN_PASSWORD), então boot/seed/teardown precisam da var — não só o boot.
    # TRUSTED_PROXY_COUNT=1: o k6 manda um X-Forwarded-For único por iteração para simular clientes
    # distintos; pós-GAP-BL a API só confia nesse XFF com 1 proxy declarado (senão 429 em massa).
    env:
      JWT_DEV_MODE: "true"
      TRUSTED_PROXY_COUNT: "1"
      GRAFANA_ADMIN_PASSWORD: ci-only

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Boot stack (docker compose)
        run: docker compose up --build -d

      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/health && exit 0
            sleep 5
          done
          echo "API did not become healthy" >&2
          docker compose logs app | tail -50 >&2 || true
          exit 1

      - name: Seed load-test organization
        run: |
          docker compose exec -T postgres psql -U kanban -d kanbanvision -c \
            "INSERT INTO organizations (id, name) VALUES
             ('11111111-1111-4111-8111-111111111111', 'k6-load-org')
             ON CONFLICT (id) DO NOTHING;"

      - name: Set up k6
        uses: grafana/setup-k6-action@v1.2.1

      - name: Execute baseline profile
        # continue-on-error: uma falha de threshold do k6 não deve parar o job — a
        # comparação abaixo é o tripwire autoritativo, e o --summary-export é escrito
        # mesmo quando um threshold estoura.
        continue-on-error: true
        run: k6 run -e PROFILE=baseline --summary-export=k6-summary.json load/simulation-journey.js

      - name: Compare against CI reference (tripwire — não-bloqueante em PR)
        run: |
          set -o pipefail
          [ -f k6-summary.json ] || { echo "k6-summary.json não gerado — boot/k6 falhou" >&2; exit 1; }
          status=0
          if [ -f load/ci-reference-summary.json ]; then
            THROUGHPUT_DROP_PCT=25 P95_RISE_PCT=50 ERROR_RISE_ABS=0.02 \
              scripts/perf-regression.sh load/ci-reference-summary.json k6-summary.json | tee report.txt || status=$?
          else
            {
              echo "Sem referência de CI commitada (load/ci-reference-summary.json)."
              echo "Reportando apenas os números atuais. Bootstrap: baixe o artifact 'k6-summary' desta run,"
              echo "revise, e commite-o como load/ci-reference-summary.json (ADR-0039 / skill /load-testing)."
              echo ""
              echo "throughput (req/s): $(jq -r '.metrics.http_reqs.rate // "n/a"' k6-summary.json)"
              echo "error rate:         $(jq -r '.metrics.http_req_failed.value // "n/a"' k6-summary.json)"
              for ep in create run_day days snapshot cfd list; do
                echo "p95 $ep (ms):       $(jq -r ".metrics[\"http_req_duration{endpoint:$ep}\"][\"p(95)\"] // \"n/a\"" k6-summary.json)"
              done
            } | tee report.txt
          fi
          {
            echo '## Performance Regression (scheduled — não-bloqueante)'
            echo ''
            echo '```'
            cat report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $status

      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k6-summary
          path: k6-summary.json
          retention-days: 30
          if-no-files-found: warn

      - name: Teardown
        if: always()
        run: docker compose down -v
