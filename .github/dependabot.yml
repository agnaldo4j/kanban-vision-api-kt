version: 2

updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      # Minor e patch agrupados em um único PR semanal.
      # Ktor fica fora do grupo: upgrade exige coordenação com Kotlin
      # (histórico: PRs #118/#127) e deve ser revisado individualmente.
      gradle-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "io.ktor:*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      actions-all:
        patterns:
          - "*"
