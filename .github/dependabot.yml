version: 2

updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      # Minor e patch agrupados em um único PR semanal.
      # Ktor fica fora deste grupo e tem grupo próprio: os artefatos io.ktor:*
      # precisam subir em lockstep, e upgrades maiores exigem coordenação com
      # Kotlin (histórico: PRs #118/#127) — 1 PR dedicado facilita a revisão.
      gradle-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "io.ktor:*"
          - "io.ktor.plugin*"
      ktor:
        applies-to: version-updates
        patterns:
          - "io.ktor:*"
          - "io.ktor.plugin*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      actions-all:
        patterns:
          - "*"
